name: valenty_cli
description: AI-powered component test generation CLI for Flutter apps with compile-time safety.
version: 0.3.3
repository: https://github.com/ulisseshen/flutter_valenty
homepage: https://github.com/ulisseshen/flutter_valenty
topics:
  - testing
  - component-testing
  - flutter
  - cli
  - ai

executables:
  valenty:

environment:
  sdk: ^3.5.0

dependencies:
  args: ^2.6.0
  cli_completion: ^0.5.0
  mason_logger: ^0.3.1
  pub_updater: ^0.5.0
  yaml: ^3.1.0
  yaml_edit: ^2.2.0
  path: ^1.9.0
  meta: ^1.12.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.25.0
  valenty_test:
    path: ../valenty_test
